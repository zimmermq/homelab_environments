                tank1:
                  mountPath: /mnt/tank1
                  hostPath: /mnt/tank1
  homeassistant:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          externalConfig:
            repoURL: "https://github.com/zimmermq/homelab_environments.git"
            targetRevision: "main"
            path: "zimmermann.lat/homeassistant-config"
            configMapName: "homeassistant-app-config"
          generic:
            deployment:
              pvcMounts:
                config:
                  hostPath: /mnt/tank1/unencrypted/apps/homeassistant/config
              # Init container copies config files from ConfigMap to PVC on every startup
              initContainers:
                - name: copy-config
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "Copying config files from ConfigMap to /config..."
                      mkdir -p /config/packages
                      for f in /configmap/*.yaml; do
                        [ -f "$f" ] || continue
                        name=$(basename "$f")
                        case "$name" in
                          packages_*) cp "$f" "/config/packages/${name#packages_}" ;;
                          *)          cp "$f" "/config/$name" ;;
                        esac
                      done
                      echo "Config files copied successfully"
                  volumeMounts:
                    - name: homeassistant-config-volume
                      mountPath: /config
                    - name: homeassistant-configmap-volume
                      mountPath: /configmap
              # ConfigMap mount for init container to read from
              configMapMounts:
                configmap:
                  mountPath: /configmap
                  configMapName: homeassistant-app-config
  redis:
    enabled: true
    argocd:
