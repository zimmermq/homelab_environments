  # Gateway LB IP — single source of truth. Pins Envoy's proxy Service via
  # spec.addresses, and is also the IP the lanDnsCheck probe expects internal
  # DNS to return for *.zimmermann.lat.
  gateway:
    loadBalancerIP: "192.168.0.80"

  # Monitor that AdGuard still resolves *.zimmermann.lat to the gateway LB IP.
  # Activates: a dns_lan_gateway module in blackbox-exporter, a Probe against
  # dnsServer, and a LanInternalDnsBroken alert when the answer is not
  # global.gateway.loadBalancerIP. Catches silent LAN→Cloudflare hairpinning.
  lanDnsCheck:
    dnsServer: "192.168.0.91"           # AdGuard
    queryName: "argocd.zimmermann.lat"  # any hostname covered by the wildcard rewrite

  argocd:
    targetRevision: main

