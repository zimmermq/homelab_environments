      helm:
        values:
          generic:
            deployment:
              pvcMounts:
                prompts:
                  hostPath: /mnt/tank1/encrypted/apps/paperless-gpt/prompts
          LLM_PROVIDER: openai
          LLM_MODEL: gpt-5.4-mini
#          LLM_PROVIDER: anthropic
#          LLM_MODEL: claude-sonnet-4-6
          AWS_OCR_BUCKET_NAME: zimmermann.lat-paperless-ocr
