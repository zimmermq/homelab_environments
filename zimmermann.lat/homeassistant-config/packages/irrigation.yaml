# Irrigation (Bewässerung)
#
# Weather-aware, soil-guarded irrigation for the Sonoff dual valve.
#
# Roles:
#   - Smart Irrigation (UI-configured, HACS): computes each zone's watering
#     duration from evapotranspiration incl. rainfall. Its per-zone duration is
#     injected into the run below via the adjust_time `actual:` field.
#   - Irrigation Unlimited (this file): schedules and runs the valves as one
#     sequence, zone after zone — never both at once (shared supply).
#   - Soil sensors (H01/H02 -> Zone A avg, H03 -> Zone B): veto + dry alarm.
#     A zone whose soil already sits at/above its target is skipped for the day.
#
# Zone map:
#   Zone A -> switch.sonoff_valve_1, soil = mean(H01, H02)
#   Zone B -> switch.sonoff_valve_2, soil = sensor.h03_soil_moisture
#
# Control model:
#   Irrigation Unlimited owns the schedule and runs the valves in sequence. The
#   05:25 pre-run automation feeds each zone its Smart Irrigation duration (or 0
#   to skip when wet / master off) via irrigation_unlimited.adjust_time, and sets
#   the valve's on-device manual_irrigation_duration so the valve self-closes
#   near the intended time even if Home Assistant is down. Config values in
#   irrigation_unlimited are static — only service-call fields accept templates.
#
# Start time is the schedule `time` below. The pre-run automation fires five
# minutes earlier; keep that lead if you change the start time.

input_boolean:
  irrigation_enable:
    name: "Bewässerung aktiv"
    icon: mdi:water-pump

input_number:
  # Skip a zone when its soil moisture already sits at/above this value.
  irrigation_zone_a_soil_target:
    name: "Bewässerung Zone A - Boden-Zielwert"
    min: 0
    max: 100
    step: 1
    initial: 40
    unit_of_measurement: "%"
    icon: mdi:water-percent
  irrigation_zone_b_soil_target:
    name: "Bewässerung Zone B - Boden-Zielwert"
    min: 0
    max: 100
    step: 1
    initial: 40
    unit_of_measurement: "%"
    icon: mdi:water-percent

sensor:
  - platform: min_max
    name: "Zone A Soil Moisture Avg"
    type: mean
    round_digits: 0
    entity_ids:
      - sensor.h01_soil_moisture
      - sensor.h02_soil_moisture

irrigation_unlimited:
  controllers:
    - name: "Garten"
      zones:
        - name: "Zone A"
          entity_id: switch.sonoff_valve_1
          # In-IU run-time clamp; the valve also self-caps on-device.
          maximum: "00:40:00"
        - name: "Zone B"
          entity_id: switch.sonoff_valve_2
          maximum: "00:40:00"
      sequences:
        - name: "Bewässerungslauf"
          schedules:
            - name: "Start"
              time: "05:30"
          zones:
            # Placeholder duration; the pre-run automation overrides it each day
            # via adjust_time (Smart Irrigation seconds, or 0 to skip a zone).
            - zone_id: 1
              duration: "00:05:00"
            - zone_id: 2
              duration: "00:05:00"

automation:
  - id: irrigation_pre_run_adjust
    alias: "Bewässerung - Lauf vorbereiten (Boden-Veto)"
    description: >
      Runs five minutes before the scheduled sequence. Sets each sequence zone's
      run time to the Smart Irrigation duration (evapotranspiration incl. rain),
      or to zero when the master switch is off or the zone's soil already meets
      its target. Also sets the valve's on-device manual_irrigation_duration to
      the day's longest planned run plus a margin (clamped 10-45 min), so losing
      Home Assistant mid-run closes the valve near the intended time instead of
      at the 45-minute ceiling.
    mode: single
    trigger:
      - platform: time
        at: "05:25:00"
    action:
      # Each zone's effective run, computed once: the Smart Irrigation duration,
      # or 0 when the master switch is off or the soil already meets its target.
      - variables:
          zone_a_secs: >-
            {% set on = is_state('input_boolean.irrigation_enable', 'on') %}
            {% set soil = states('sensor.zone_a_soil_moisture_avg') | float(0) %}
            {% set target = states('input_number.irrigation_zone_a_soil_target') | float(100) %}
            {{ (states('sensor.smart_irrigation_zone_a') | int(0)) if (on and soil < target) else 0 }}
          zone_b_secs: >-
            {% set on = is_state('input_boolean.irrigation_enable', 'on') %}
            {% set soil = states('sensor.h03_soil_moisture') | float(0) %}
            {% set target = states('input_number.irrigation_zone_b_soil_target') | float(100) %}
            {{ (states('sensor.smart_irrigation_zone_b') | int(0)) if (on and soil < target) else 0 }}
      # On-device safety cap = longer planned run + margin, clamped 10-45 min.
      - service: number.set_value
        target:
          entity_id: number.sonoff_valve_manual_irrigation_duration
        data:
          value: >-
            {% set minutes = (([zone_a_secs | int(0), zone_b_secs | int(0)] | max) / 60) | round(0, 'ceil') | int + 1 %}
            {{ [10, [minutes, 45] | min] | max }}
      # Feed each sequence zone its run time (0 seconds = skipped this cycle).
      - service: irrigation_unlimited.adjust_time
        data:
          entity_id: binary_sensor.irrigation_unlimited_c1_m
          sequence_id: 1
          zones: [1]
          actual: "{{ timedelta(seconds=zone_a_secs | int(0)) }}"
      - service: irrigation_unlimited.adjust_time
        data:
          entity_id: binary_sensor.irrigation_unlimited_c1_m
          sequence_id: 1
          zones: [2]
          actual: "{{ timedelta(seconds=zone_b_secs | int(0)) }}"

  - id: irrigation_dry_alarm
    alias: "Bewässerung - Trockenalarm"
    description: >
      Warns when a zone's soil is still below its target well after the daily
      watering window — a sign the line is clogged, the supply is empty, a valve
      is stuck, or a soil sensor has failed. A zone skipped because it was
      already wet sits above target, so it does not alarm.
    mode: single
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.irrigation_enable
        state: "on"
    action:
      - variables:
          zone_a_soil: "{{ states('sensor.zone_a_soil_moisture_avg') | float(0) }}"
          zone_a_target: "{{ states('input_number.irrigation_zone_a_soil_target') | float(100) }}"
          zone_b_soil: "{{ states('sensor.h03_soil_moisture') | float(0) }}"
          zone_b_target: "{{ states('input_number.irrigation_zone_b_soil_target') | float(100) }}"
          dry_zones: >-
            {{ (['Zone A'] if zone_a_soil < zone_a_target else [])
             + (['Zone B'] if zone_b_soil < zone_b_target else []) }}
      - condition: template
        value_template: "{{ dry_zones | length > 0 }}"
      - service: notify.ALL_DEVICES
        data:
          title: "Bewässerung: Boden noch trocken"
          message: >-
            {{ dry_zones | join(' und ') }} liegt nach dem Bewässerungsfenster
            noch unter dem Zielwert. Wasserzufuhr, Ventil oder Bodensensor prüfen.

  - id: irrigation_si_reset_bucket
    alias: "Bewässerung - Smart Irrigation Bucket zurücksetzen"
    description: >
      Resets a zone's Smart Irrigation bucket right after its valve finishes a
      run, so the next calculation starts from topped-up soil. A skipped zone's
      valve never turns on, so its bucket is left untouched.
    mode: parallel
    trigger:
      - platform: state
        entity_id: binary_sensor.irrigation_unlimited_c1_z1
        from: "on"
        to: "off"
        id: zone_a
      - platform: state
        entity_id: binary_sensor.irrigation_unlimited_c1_z2
        from: "on"
        to: "off"
        id: zone_b
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: zone_a
            sequence:
              - service: smart_irrigation.reset_bucket
                target:
                  entity_id: sensor.smart_irrigation_zone_a
          - conditions:
              - condition: trigger
                id: zone_b
            sequence:
              - service: smart_irrigation.reset_bucket
                target:
                  entity_id: sensor.smart_irrigation_zone_b