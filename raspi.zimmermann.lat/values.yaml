global:
  cluster:
    serverip: 192.168.0.15
    username: ubuntu
    cluster-name: raspi.zimmermann.lat
    ip-range: 192.168.0.91-192.168.0.99

  domain: "raspi.zimmermann.lat"
  akeyless:
    path: "/raspi.zimmermann.lat"
  email: "michael@zimmermann.lat"

  # No kube-prometheus-stack in this environment — suppress all
  # monitoring.coreos.com resources to avoid CRD-not-found sync errors.
  monitoring:
    enabled: false

  cloudflare:
    email: "michael@zimmermann.lat"

  letsencrypt:
    email: "michael@zimmermann.lat"

  # Envoy Gateway native OIDC (AWS Cognito). Reuses the shared Cognito app
  # client — the auth.raspi.zimmermann.lat callback is already registered on
  # it (the old oauth2-proxy used the same one).
  oidc:
    issuerUrl: "https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_A6gtz8gw5"
    clientId: "5vmqlfbdhdrma83s40bnrbb59i"
    cookieDomain: "raspi.zimmermann.lat"   # NO leading dot — Envoy rejects it

  # No global.security.cloudflareOriginCA on purpose: raspi is LAN-only
  # (grey-cloud DNS, LAN IP). The gateway then runs with just the LAN listener
  # — no public/mTLS listener, no router NAT, no Cloudflare AOP needed.

  # Gateway LB IP — single source of truth. Pins Envoy's proxy Service via
  # spec.addresses; without this the IP would just be whatever MetalLB happens
  # to hand out first from global.cluster.ip-range.
  gateway:
    loadBalancerIP: "192.168.0.91"

  argocd:
    targetRevision: main

apps:
  adguard:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          generic:
            deployment:
              pvcMounts:
                config:
                  hostPath: /mnt/data/apps/adguard/config
                data:
                  hostPath: /mnt/data/apps/adguard/data
  argocd:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
  akeyless:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
  cert-manager:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
  envoy-gateway:
    enabled: true
    argocd:
      targetRevision: ~
      # Gateway CR + all envoy-gateway resources live here; global.gateway.namespace
      # is derived from this, so every app's HTTPRoute follows automatically.
      # The &envoyNamespace anchor is reused below for the controller, so the
      # namespace is written exactly once.
      namespace: &envoyNamespace "envoy-gateway"
      helm:
        values:
          # loadBalancerIP is now set in global.gateway.loadBalancerIP (single source of truth).
          # Controller + proxy fleet share the gateway's namespace (retires envoy-gateway-system).
          additionalExposedPorts:
            # Keep the chart-default dns listener (53/UDP) — AdGuard's UDPRoute
            # attaches to it. sftpgo/ftp/samba defaults removed; unused here.
            sftpgo: null
            ftp: null
            samba: null
          envoyGateway:
            namespace: *envoyNamespace
  beszel:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          generic:
            deployment:
              pvcMounts:
                data:
                  hostPath: /mnt/data/apps/beszel/data
          # microk8s exposes its containerd socket here, not the standard
          # /var/run/docker.sock. Beszel's agent still falls back to host
          # CPU/RAM/disk metrics if the mount type doesn't match.
          agent:
            enabled: true
            containerSocket: /var/snap/microk8s/common/run/containerd.sock
  homer:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
    additionalLinks:
      githubEnvironments:
        name: "Environments"
        group: "infrastructure"
        subtitle: "GitHub"
        logo: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/github.svg"
        url: "https://github.com/zimmermq/homelab_environments"